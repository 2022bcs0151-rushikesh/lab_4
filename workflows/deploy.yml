deploy:
  runs-on: ubuntu-latest
  needs: train

  steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Install tools
    run: |
      sudo apt-get update
      sudo apt-get install -y jq bc

  - name: Download model artifact
    uses: actions/download-artifact@v4
    with:
      name: model
      path: app/

  - name: Download metrics artifact
    uses: actions/download-artifact@v4
    with:
      name: metrics
      path: results/

  - name: Read new F1
    id: metrics
    run: |
      NEW_F1=$(jq '.f1' results/metrics.json)
      echo "NEW_F1=$NEW_F1" >> $GITHUB_ENV

  - name: Compare metrics
    id: compare
    run: |
      OLD_F1=${{ vars.BEST_F1 }}
      NEW_F1=$NEW_F1

      echo "OLD=$OLD_F1"
      echo "NEW=$NEW_F1"

      if (( $(echo "$NEW_F1 > $OLD_F1" | bc -l) )); then
        echo "deploy=yes" >> $GITHUB_OUTPUT
      else
        echo "<YOUR_ROLL_NO>----Metric did not improve"
        echo "deploy=no" >> $GITHUB_OUTPUT
      fi

  - name: Stop if no improvement
    if: steps.compare.outputs.deploy == 'no'
    run: exit 0

  - name: Login to DockerHub
    if: steps.compare.outputs.deploy == 'yes'
    run: |
      echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

  - name: Build Docker image
    if: steps.compare.outputs.deploy == 'yes'
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/wine-api:latest .

  - name: Push Docker image
    if: steps.compare.outputs.deploy == 'yes'
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/wine-api:latest

  - name: Update BEST_F1
    if: steps.compare.outputs.deploy == 'yes'
    run: |
      curl -X PATCH \
      -H "Authorization: token ${{ secrets.GH_PAT }}" \
      -H "Accept: application/vnd.github+json" \
      https://api.github.com/repos/${{ github.repository }}/actions/variables/BEST_F1 \
      -d '{"name":"BEST_F1","value":"'"$NEW_F1"'"}'
