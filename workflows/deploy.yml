name: Train & Deploy Model

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:

  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Train model
      run: python scripts/train.py

    - name: Upload model
      uses: actions/upload-artifact@v4
      with:
        name: model
        path: app/model.pkl

    - name: Upload metrics
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: results/metrics.json

  deploy:
    runs-on: ubuntu-latest
    needs: train

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download model artifact
      uses: actions/download-artifact@v4
      with:
        name: model
        path: app/

    - name: Download metrics artifact
      uses: actions/download-artifact@v4
      with:
        name: metrics
        path: results/

    - name: Read new F1
      id: metrics
      run: |
        NEW_F1=$(jq '.f1' results/metrics.json)
        echo "new_f1=$NEW_F1" >> $GITHUB_OUTPUT

    - name: Compare metrics
      id: compare
      run: |
        echo "Best F1: ${{ vars.BEST_F1 }}"
        echo "New F1:  ${{ steps.metrics.outputs.new_f1 }}"
        PythonF1=${{ steps.metrics.outputs.new_f1 }}
        BestF1=${{ vars.BEST_F1 }}
        if (( $(echo "$PythonF1 <= $BestF1" | bc -l) )); then
          echo "${{ secrets.ROLL_NO }} ---- Metric did not improve"
          echo "deploy=no" >> $GITHUB_OUTPUT
        else
          echo "deploy=yes" >> $GITHUB_OUTPUT
        fi

    - name: Stop if no improvement
      if: steps.compare.outputs.deploy == 'no'
      run: echo "Stopping deployment"

    - name: Log in to DockerHub
      if: steps.compare.outputs.deploy == 'yes'
      run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build Docker image
      if: steps.compare.outputs.deploy == 'yes'
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/wine-model:latest .

    - name: Push Docker image
      if: steps.compare.outputs.deploy == 'yes'
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/wine-model:latest

    - name: Update Best Metric
      if: steps.compare.outputs.deploy == 'yes'
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GH_PAT }}
        script: |
          await github.rest.actions.updateRepoVariable({
            owner: context.repo.owner,
            repo: context.repo.repo,
            name: "BEST_F1",
            value: "${{ steps.metrics.outputs.new_f1 }}"
          })
