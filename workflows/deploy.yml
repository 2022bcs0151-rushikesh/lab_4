name: Train & Deploy Model

on:
  push:
    branches: ["main"]

jobs:

  train:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - run: pip install -r requirements.txt

    - run: python scripts/train.py

    - uses: actions/upload-artifact@v4
      with:
        name: artifacts
        path: |
          app/model.pkl
          results/metrics.json

  deploy:
    runs-on: ubuntu-latest
    needs: train

    steps:
    - uses: actions/checkout@v3

    - name: Install jq & bc
      run: |
        sudo apt-get update
        sudo apt-get install -y jq bc

    - uses: actions/download-artifact@v4
      with:
        name: artifacts

    - name: Read metric
      id: metric
      run: |
        VALUE=$(jq '.f1' results/metrics.json)
        echo "VALUE=$VALUE" >> $GITHUB_ENV

    - name: Compare
      id: compare
      run: |
        OLD=${{ vars.BEST_F1 }}
        NEW=$VALUE

        echo "OLD=$OLD"
        echo "NEW=$NEW"

        if (( $(echo "$NEW > $OLD" | bc -l) )); then
          echo "deploy=true" >> $GITHUB_OUTPUT
        else
          echo "deploy=false" >> $GITHUB_OUTPUT
          echo "Metric did not improve"
        fi

    - name: Stop if not improved
      if: steps.compare.outputs.deploy == 'false'
      run: exit 0

    - name: Docker login
      run: |
        echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/wine-api:latest .

    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/wine-api:latest
